[tool.poetry]
name = "laife"
version = "0.1.0"
description = ""
authors = ["Your Name <you@example.com>"]
readme = "README.md"
packages = [{include = "laife", from = "src"}]

[tool.poetry.dependencies]
python = "~3.11"
pygame = "^2.6.0"
loguru = "^0.7.2"
langchain = "^0.2.12"
langchain-ollama = "^0.1.1"


[tool.poetry.group.test.dependencies]
pytest = "^8.3.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.isort]
profile = "black"
force_sort_within_sections = true
multi_line_output = 3
